name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-24.04

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        ini-file: development
        ini-values: zend.assertions=1, assert.exception=1
        coverage: pcov
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Build runtime
      run: cargo build --release --manifest-path runtime/Cargo.toml
    - name: Verify PHP Install
      run: php -i
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Run PHPStan
      run: composer run-script phpstan
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      # PCOV must instrument `app/` (not e.g. only `src/` from php.ini). Scope to `app/` to avoid OOM from scanning vendor/.
      run: php -d pcov.directory=${{ github.workspace }}/app vendor/bin/pest --coverage --min=89
    - name: Run Laravel Pint
      run: vendor/bin/pint --test

  self-compile:
    runs-on: ubuntu-24.04
    needs: laravel-tests

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        ini-file: development
        ini-values: memory_limit=1G
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Build runtime
      run: cargo build --release --manifest-path runtime/Cargo.toml
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Self-compile picoHP
      run: bash scripts/self-compile.sh
    - name: Verify self-compiled binary exists
      run: test -x /tmp/picoHP/a.out
    - name: Run self-compiled binary
      run: |
        /tmp/picoHP/a.out 2>&1 | head -1 | grep -q "Usage: picohp build"
