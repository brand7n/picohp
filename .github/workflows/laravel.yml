name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-24.04

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        ini-file: development
        ini-values: zend.assertions=1, assert.exception=1
        coverage: pcov
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Build runtime
      run: cargo build --release --manifest-path runtime/Cargo.toml
    - name: Verify PHP Install
      run: php -i
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Run PHPStan
      run: composer run-script phpstan
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      # PCOV must instrument `app/` (not e.g. only `src/` from php.ini). Scope to `app/` to avoid OOM from scanning vendor/.
      # --min aligns with current measured line coverage (~86%); raise when gaps (e.g. FileIndex, CLI) are covered.
      run: php -d pcov.directory=${{ github.workspace }}/app vendor/bin/pest --coverage --min=86
    - name: Run Laravel Pint
      run: vendor/bin/pint --test
